  // アイコン名か絵文字かを判定（Material Icon名はASCII小文字+数字+アンダースコア）
  function isIconName(val) {
    return typeof val === 'string' && /^[a-z][a-z0-9_]*$/.test(val);
  }
  // リストアイコンHTML文字列を返す（Material Icon名 or 絵文字フォールバック）
  function renderIconHtml(val) {
    const v = val || 'checklist';
    if (isIconName(v)) {
      return `<span class="material-icons" style="font-size:1.2em;vertical-align:middle;">${v}</span>`;
    }
    return `<span>${v}</span>`;
  }
  // アイコン表示要素を生成（DOM操作用）
  function createIconEl(val) {
    const v = val || 'checklist';
    if (isIconName(v)) {
      const s = document.createElement('span');
      s.className = 'material-icons';
      s.style.cssText = 'font-size:1.2em;vertical-align:middle;';
      s.textContent = v;
      return s;
    }
    return document.createTextNode(v);
  }

  let tabsSortable = null;

  function renderTabs() {
    const tabsBar = document.getElementById('tabs-bar');
    if (!tabsBar) return;

    const visibleLists = allLists.filter(l => l.shared || l.ownerId === currentUserEmail);
    // order 順でソート
    visibleLists.sort((a, b) => (a.order || 0) - (b.order || 0));

    // currentListId が非表示リストなら先頭にフォールバック
    if (visibleLists.length > 0 && !visibleLists.find(l => l.id === currentListId)) {
      currentListId = visibleLists[0].id;
    }

    tabsBar.innerHTML = '';

    visibleLists.forEach(list => {
      const tab = document.createElement('div');
      tab.className = 'tab-item' + (list.id === currentListId ? ' active' : '');
      tab.dataset.listId = list.id;

      const sharedIcon = list.shared ? '<span class="material-icons" style="font-size:0.8em;">group</span>' : '<span class="material-icons" style="font-size:0.8em;">lock</span>';
      const catIdsInList = shoppingCategories.filter(c => (c.listId || 'default') === list.id).map(c => c.id);
      const countUndone = shoppingItems.filter(i => {
        const inList = i.listId ? i.listId === list.id : catIdsInList.includes(i.categoryId);
        return inList && !i.isDone;
      }).length;

      tab.innerHTML = `${renderIconHtml(list.emoji)}<span style="margin-left:4px;">${list.name}</span><span style="font-size:0.7em; opacity:0.6; margin-left:3px;">${sharedIcon}</span>`;
      if (countUndone > 0) {
        const badge = document.createElement('span');
        badge.className = 'tab-badge';
        badge.textContent = countUndone;
        tab.appendChild(badge);
      }

      tab.onclick = () => {
        if (tabsBar.classList.contains('tabs-sorting')) return; // 並び替えモード中はクリック無効
        currentListId = list.id;
        const pt = document.getElementById('page-title');
        if (pt) { pt.innerHTML = ''; pt.appendChild(createIconEl(list.emoji)); pt.appendChild(document.createTextNode(' ' + list.name)); }
        renderTabs();
        renderList();
      };

      // 長押し並び替えモード
      let longPressTimer = null;
      const startLongPress = () => {
        longPressTimer = setTimeout(() => {
          tabsBar.classList.add('tabs-sorting');
          if (tabsSortable) tabsSortable.option('disabled', false);
          tab.style.background = '#e3f2fd';
        }, 500);
      };
      const cancelLongPress = () => { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } };
      tab.addEventListener('mousedown', startLongPress);
      tab.addEventListener('touchstart', startLongPress, { passive: true });
      tab.addEventListener('mouseup', cancelLongPress);
      tab.addEventListener('touchend', cancelLongPress);
      tab.addEventListener('mouseleave', cancelLongPress);

      tabsBar.appendChild(tab);
    });

    // ＋ボタン
    const addBtn = document.createElement('button');
    addBtn.className = 'tab-add-btn';
    addBtn.innerHTML = '<span class="material-icons">add</span>';
    addBtn.title = '新しいリストを作成';
    addBtn.onclick = (e) => { e.stopPropagation(); openCreateListModal(); };
    tabsBar.appendChild(addBtn);

    // タブソータブル初期化（長押しで有効化）
    if (tabsSortable) tabsSortable.destroy();
    tabsSortable = Sortable.create(tabsBar, {
      draggable: '.tab-item',
      animation: 150,
      disabled: true,
      onEnd: async (evt) => {
        tabsBar.classList.remove('tabs-sorting');
        tabsBar.querySelectorAll('.tab-item').forEach(t => t.style.background = '');
        if (tabsSortable) tabsSortable.option('disabled', true);
        // order を更新（default は常に先頭のため書き換えない）
        const tabEls = Array.from(tabsBar.querySelectorAll('.tab-item'));
        const batch = writeBatch(db);
        tabEls.forEach((el, index) => {
          const lid = el.dataset.listId;
          if (lid && lid !== 'default') {
            batch.update(doc(db, 'list_meta', lid), { order: index });
          }
        });
        await batch.commit().catch(e => console.error('tab order update failed', e));
      }
    });

    // 並び替えモード中に外側タップで解除
    if (!tabsBar._sortExitBound) {
      tabsBar._sortExitBound = true;
      document.addEventListener('click', (e) => {
        if (!tabsBar.contains(e.target) && tabsBar.classList.contains('tabs-sorting')) {
          tabsBar.classList.remove('tabs-sorting');
          tabsBar.querySelectorAll('.tab-item').forEach(t => t.style.background = '');
          if (tabsSortable) tabsSortable.option('disabled', true);
        }
      });
    }

    // ページタイトルを現在のリストに合わせる
    const currentList = visibleLists.find(l => l.id === currentListId);
    const pt = document.getElementById('page-title');
    if (pt && currentList) { pt.innerHTML = ''; pt.appendChild(createIconEl(currentList.emoji)); pt.appendChild(document.createTextNode(' ' + currentList.name)); }
  }

  function openListSettingsModal() {
    document.getElementById('list-settings-modal').classList.add('open');
    renderListSettingsContent();
  }

  function closeListSettingsModal() {
    document.getElementById('list-settings-modal').classList.remove('open');
  }

  function renderListSettingsContent() {
    const visibleLists = allLists.filter(l => l.shared || l.ownerId === currentUserEmail);
    visibleLists.sort((a, b) => (a.order || 0) - (b.order || 0));

    const container = document.getElementById('list-settings-content');
    container.innerHTML = '';

    visibleLists.forEach(list => {
      const row = document.createElement('div');
      row.className = 'list-meta-row';
      row.style.flexWrap = 'nowrap';
      row.dataset.listId = list.id;

      // ドラッグハンドル
      const dragHandle = document.createElement('span');
      dragHandle.className = 'list-drag-handle';
      dragHandle.innerHTML = '<span class="material-icons">drag_handle</span>';
      dragHandle.style.cssText = 'color:#bbb; cursor:grab; padding:4px 6px; font-size:1.1em;';
      dragHandle.title = 'ドラッグで並び替え';
      row.appendChild(dragHandle);

      // アイコン＋リスト名（タップでモーダル編集）
      const nameSpan = document.createElement('span');
      nameSpan.style.cssText = 'flex:1; font-weight:bold; font-size:1em; padding:4px 2px; display:flex; align-items:center; gap:4px;';
      nameSpan.appendChild(createIconEl(list.emoji));
      nameSpan.appendChild(document.createTextNode(' ' + list.name));
      if (!list.locked) {
        nameSpan.style.cursor = 'pointer';
        nameSpan.style.borderBottom = '1px dashed #ccc';
        nameSpan.title = 'タップして編集';
        nameSpan.onclick = () => openEditListModal(list);
      } else {
        nameSpan.style.cursor = 'default';
      }
      row.appendChild(nameSpan);

      // ロック/アンロックボタン
      const lockBtn = document.createElement('button');
      lockBtn.style.cssText = 'background:none; border:none; cursor:pointer; padding:4px 6px;';
      if (list.locked) {
        lockBtn.innerHTML = '<span class="material-icons" style="font-size:1.1em; color:#f57c00;">lock</span>';
        lockBtn.title = 'ロック中（タップで解除）';
      } else {
        lockBtn.innerHTML = '<span class="material-icons" style="font-size:1.1em; color:#bbb;">lock_open</span>';
        lockBtn.title = 'タップでロック';
      }
      lockBtn.onclick = async () => {
        try { await updateDoc(doc(db, 'list_meta', list.id), { locked: !list.locked }); } catch (e) { console.error(e); }
      };
      row.appendChild(lockBtn);

      container.appendChild(row);
    });

    // Sortableでリスト順変更
    if (window._listSettingsSortable) window._listSettingsSortable.destroy();
    window._listSettingsSortable = Sortable.create(container, {
      handle: '.list-drag-handle',
      animation: 150,
      onEnd: async (evt) => {
        const rows = Array.from(container.children);
        const batch = writeBatch(db);
        rows.forEach((row, index) => {
          const listId = row.dataset.listId;
          if (listId) {
            batch.update(doc(db, 'list_meta', listId), { order: index });
          }
        });
        await batch.commit().catch(e => console.error('list order update failed', e));
      }
    });
  }

  function openDeleteListModal(list) {
    const modal = document.getElementById('list-delete-confirm-modal');
    document.getElementById('delete-list-name-display').textContent = `「${list.name}」`;
    document.getElementById('delete-list-name-input').value = '';
    document.getElementById('delete-list-name-error').textContent = '';
    modal.dataset.listId = list.id;
    modal.dataset.listName = list.name;
    modal.classList.add('open');
  }

  window.closeDeleteListModal = function() {
    document.getElementById('list-delete-confirm-modal').classList.remove('open');
  };

  window.executeDeleteList = async function() {
    const modal = document.getElementById('list-delete-confirm-modal');
    const id = modal.dataset.listId;
    const name = modal.dataset.listName;
    const inputVal = document.getElementById('delete-list-name-input').value.trim();

    if (inputVal !== name) {
      document.getElementById('delete-list-name-error').textContent = 'リスト名が一致しません';
      return;
    }
    document.getElementById('delete-list-name-error').textContent = '';

    try {
      const batch = writeBatch(db);
      shoppingCategories.filter(c => (c.listId || 'default') === id).forEach(c => batch.delete(doc(db, 'shopping_categories', c.id)));
      shoppingItems.filter(i => {
        if (i.listId) return i.listId === id;
        const cat = shoppingCategories.find(c => c.id === i.categoryId);
        return cat && (cat.listId || 'default') === id;
      }).forEach(i => batch.delete(doc(db, 'shopping_list', i.id)));
      batch.delete(doc(db, 'list_meta', id));
      await batch.commit();

      if (currentListId === id) {
        const remaining = allLists.filter(l => l.id !== id);
        currentListId = remaining.length > 0 ? remaining[0].id : 'default';
      }
      closeDeleteListModal();
      closeListSettingsModal();
    } catch (err) {
      console.error(err);
      alert('削除に失敗しました: ' + err.message);
    }
  };

  window.openCreateListModal = openCreateListModal;
  function openCreateListModal() {
    _editingListId = null;
    _newListEmoji = 'checklist';
    document.getElementById('new-list-name').value = '';
    document.getElementById('new-list-name-error').textContent = '';
    setNewListShared(true);
    renderEmojiPicker('');
    document.getElementById('emoji-search-input').value = '';
    document.getElementById('list-modal-title').innerHTML = '<span class="material-icons" style="vertical-align:middle;">add_circle</span> 新しいリストを作成';
    document.getElementById('list-modal-submit-btn').textContent = '作成する';
    document.getElementById('list-modal-delete-btn').style.display = 'none';
    document.getElementById('list-create-modal').classList.add('open');
    setTimeout(() => document.getElementById('new-list-name').focus(), 100);
  }

  function openEditListModal(list) {
    _editingListId = list.id;
    _newListEmoji = list.emoji || 'checklist';
    document.getElementById('new-list-name').value = list.name;
    document.getElementById('new-list-name-error').textContent = '';
    setNewListShared(!!list.shared);
    renderEmojiPicker('');
    document.getElementById('emoji-search-input').value = '';
    document.getElementById('list-modal-title').innerHTML = '<span class="material-icons" style="vertical-align:middle;">edit</span> リストを編集';
    document.getElementById('list-modal-submit-btn').textContent = '保存する';
    document.getElementById('list-modal-delete-btn').style.display = '';
    document.getElementById('list-create-modal').classList.add('open');
    setTimeout(() => document.getElementById('new-list-name').focus(), 100);
  }

  window.renderEmojiPicker = renderEmojiPicker;
  window.setNewListShared = function(isShared) {
    const yesBtn = document.getElementById('new-list-shared-yes');
    const noBtn = document.getElementById('new-list-shared-no');
    if (isShared) {
      yesBtn.className = 'shared-toggle-btn active-shared';
      noBtn.className = 'shared-toggle-btn';
    } else {
      yesBtn.className = 'shared-toggle-btn';
      noBtn.className = 'shared-toggle-btn active-private';
    }
    yesBtn.dataset.active = isShared ? '1' : '0';
  };

  function renderEmojiPicker(query) {
    const pickerEl = document.getElementById('emoji-picker-container');
    pickerEl.innerHTML = '';
    const q = (query || '').trim().toLowerCase();
    const filtered = q
      ? LIST_ICONS.filter(o => o.k.includes(q) || o.n.includes(q))
      : LIST_ICONS;
    filtered.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'icon-opt' + (o.n === _newListEmoji ? ' selected' : '');
      btn.innerHTML = `<span class="material-icons">${o.n}</span>`;
      btn.title = o.k;
      btn.onclick = () => {
        _newListEmoji = o.n;
        pickerEl.querySelectorAll('.icon-opt').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      };
      pickerEl.appendChild(btn);
    });
  }

  window.closeCreateListModal = function() {
    document.getElementById('list-create-modal').classList.remove('open');
    _editingListId = null;
  };

  window.openDeleteListFromEditModal = function() {
    if (!_editingListId) return;
    const list = allLists.find(l => l.id === _editingListId);
    if (!list) return;
    closeCreateListModal();
    openDeleteListModal(list);
  };

  window.createNewList = async function() {
    const name = document.getElementById('new-list-name').value.trim();
    if (!name) {
      document.getElementById('new-list-name-error').textContent = 'リスト名を入力してください';
      document.getElementById('new-list-name').focus();
      return;
    }
    const shared = document.getElementById('new-list-shared-yes').dataset.active === '1';

    try {
      if (_editingListId) {
        // 編集モード
        await updateDoc(doc(db, 'list_meta', _editingListId), {
          name, emoji: _newListEmoji, shared
        });
      } else {
        // 新規作成モード
        const maxOrder = allLists.length > 0 ? Math.max(...allLists.map(l => l.order || 0)) : 0;
        const docRef = await addDoc(collection(db, 'list_meta'), {
          name, emoji: _newListEmoji, shared, ownerId: currentUserEmail,
          order: maxOrder + 1, createdAt: serverTimestamp()
        });
        currentListId = docRef.id;
      }
      closeCreateListModal();
    } catch (err) {
      console.error(err);
      alert(_editingListId ? 'リストの更新に失敗しました' : 'リストの作成に失敗しました');
    }
  };

  // ===== JSON エクスポート / インポート =====
  // 現在のリストのアイテムのみエクスポート
  window.exportCurrentList = function() {
    const catIds = shoppingCategories.filter(c => (c.listId || 'default') === currentListId).map(c => c.id);
    const items = shoppingItems.filter(i => catIds.includes(i.categoryId));
    const cats = shoppingCategories.filter(c => (c.listId || 'default') === currentListId);
    const currentList = allLists.find(l => l.id === currentListId);
    const data = { listName: currentList?.name || 'list', categories: cats, items };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `list_${(currentList?.name || 'list').replace(/\s/g,'_')}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // 全リストデータをエクスポート
  window.exportAllLists = function() {
    const data = { lists: allLists, categories: shoppingCategories, items: shoppingItems };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `lists_all_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // 現在のリストにJSONからアイテムをインポート
  window.importCurrentList = function() {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          const items = Array.isArray(data) ? data : (data.items || []);
          const batch = writeBatch(db);
          // カテゴリマップ (name→id) - 現在のリスト
          const catMap = {};
          shoppingCategories.filter(c => (c.listId||'default')===currentListId).forEach(c => { catMap[c.name] = c.id; });
          let added = 0;
          for (const item of items) {
            if (!item.name) continue;
            let catId = item.categoryId && shoppingCategories.find(c=>c.id===item.categoryId) ? item.categoryId : (catMap[item.category] || null);
            if (!catId && shoppingCategories.length > 0) catId = shoppingCategories.find(c=>(c.listId||'default')===currentListId)?.id || null;
            const ref = doc(collection(db, 'shopping_list'));
            batch.set(ref, { name: item.name, categoryId: catId, isDone: false, order: added, listId: currentListId, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
            added++;
          }
          await batch.commit();
          alert(`${added}件インポートしました`);
        } catch (err) { console.error(err); alert('インポートに失敗しました: ' + err.message); }
      };
      reader.readAsText(file);
    };
    input.click();
  };
</script>

<!-- ===== リスト設定モーダル ===== -->
<div id="list-settings-modal" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="document.getElementById('list-settings-modal').classList.remove('open')"><span class="material-icons">close</span></button>
    <p class="modal-title"><span class="material-icons" style="vertical-align:middle;">settings</span> リスト管理</p>
    <div id="list-settings-content"></div>
    <button onclick="openCreateListModal()" style="margin-top:12px; width:100%; padding:12px; background:#4caf50; color:#fff; border:none; border-radius:8px; font-size:1em; font-weight:bold; cursor:pointer;"><span class="material-icons" style="font-size:0.9em;vertical-align:middle;">add</span> 新しいリストを作成</button>
  </div>
</div>

<!-- ===== リスト作成/編集モーダル ===== -->
<div id="list-create-modal" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeCreateListModal()"><span class="material-icons">close</span></button>
    <p id="list-modal-title" class="modal-title"><span class="material-icons" style="vertical-align:middle;">add_circle</span> 新しいリストを作成</p>
    <div style="margin-bottom:12px;">
      <label style="font-size:0.9em; color:#666; display:block; margin-bottom:6px; font-weight:bold;">リスト名</label>
      <input id="new-list-name" type="text" placeholder="例: 持ち物リスト" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:1em; box-sizing:border-box;">
      <div id="new-list-name-error" style="color:#d32f2f; font-size:0.85em; min-height:18px; margin-top:4px;"></div>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:0.9em; color:#666; display:block; margin-bottom:6px; font-weight:bold;">アイコン</label>
      <input id="emoji-search-input" class="emoji-search" type="text" placeholder="アイコンを検索（例: 買い物、掃除）" oninput="renderEmojiPicker(this.value)">
      <div id="emoji-picker-container" class="emoji-picker"></div>
    </div>
    <div style="margin-bottom:16px;">
      <label style="font-size:0.9em; color:#666; display:block; margin-bottom:8px; font-weight:bold;">共有設定</label>
      <div class="shared-toggle">
        <button type="button" id="new-list-shared-yes" class="shared-toggle-btn active-shared" onclick="setNewListShared(true)"><span class="material-icons" style="font-size:0.9em;vertical-align:middle;">group</span> 共有（家族全員）</button>
        <button type="button" id="new-list-shared-no" class="shared-toggle-btn" onclick="setNewListShared(false)"><span class="material-icons" style="font-size:0.9em;vertical-align:middle;">lock</span> 個人（自分だけ）</button>
      </div>
    </div>
    <button id="list-modal-submit-btn" onclick="createNewList()" style="width:100%; padding:12px; background:#1976d2; color:#fff; border:none; border-radius:8px; font-size:1em; font-weight:bold; cursor:pointer;">作成する</button>
    <button id="list-modal-delete-btn" onclick="openDeleteListFromEditModal()" style="display:none; width:100%; padding:10px; margin-top:10px; background:#ffebee; color:#d32f2f; border:1px solid #ef9a9a; border-radius:8px; font-size:0.95em; font-weight:bold; cursor:pointer;"><span class="material-icons" style="font-size:0.9em;vertical-align:middle;">delete</span> このリストを削除</button>
  </div>
</div>

<!-- ===== リスト削除確認モーダル ===== -->
<div id="list-delete-confirm-modal" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeDeleteListModal()"><span class="material-icons">close</span></button>
    <p class="modal-title"><span class="material-icons" style="color:#d32f2f;vertical-align:middle;">delete</span> リストの削除</p>
    <p style="font-size:0.95em; margin-bottom:12px;"><strong id="delete-list-name-display" style="color:#d32f2f;"></strong> を削除します。<br><span style="color:#666;">カテゴリとアイテムもすべて削除されます。</span></p>
    <label style="font-size:0.9em; color:#666; font-weight:bold; display:block; margin-bottom:6px;">確認のためリスト名を入力してください:</label>
    <input id="delete-list-name-input" type="text" placeholder="リスト名を入力" style="width:100%; padding:10px; border:2px solid #d32f2f; border-radius:6px; font-size:1em; box-sizing:border-box; margin-bottom:4px;">
    <div id="delete-list-name-error" style="color:#d32f2f; font-size:0.85em; min-height:20px; margin-bottom:12px;"></div>
    <button id="delete-list-confirm-btn" onclick="executeDeleteList()" style="width:100%; padding:12px; background:#d32f2f; color:#fff; border:none; border-radius:8px; font-size:1em; font-weight:bold; cursor:pointer;">削除する</button>
  </div>
</div>

<!-- ===== 入力履歴管理モーダル ===== -->
<div id="history-modal" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeHistoryModal()"><span class="material-icons">close</span></button>
    <p class="modal-title"><span class="material-icons" style="vertical-align:middle;">history</span> 入力履歴</p>
    <button onclick="clearAllHistory()" style="width:100%; padding:9px; background:#ffebee; color:#d32f2f; border:1px solid #ef9a9a; border-radius:6px; font-size:0.9em; font-weight:bold; cursor:pointer; margin-bottom:12px;"><span class="material-icons" style="font-size:0.9em;vertical-align:middle;">delete</span> 履歴を全削除</button>
    <div id="history-modal-list" style="max-height:280px; overflow-y:auto;"></div>
  </div>
</div>

<div id="undo-snackbar" class="undo-snackbar">
  <span id="undo-snackbar-msg"></span>
  <button id="undo-snackbar-btn">元に戻す</button>
</div>

</body>
</html>
